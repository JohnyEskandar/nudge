<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"

    />
    <title>Nudge</title>
    <meta name="description" content="Stay close to the people who matter." />

    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#faf7f2" />

    <!-- iOS ignores most of the manifest; these are what it actually reads when a
         user taps Add to Home Screen. Without them the installed app opens with
         browser chrome and the Push API stays unavailable. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Nudge" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
  </head>
